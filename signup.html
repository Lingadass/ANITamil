<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - αηιмєѕ தமிழ்</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Subtle ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top left, rgba(135,206,235,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(176,108,245,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card ── */
    .auth-container {
      background: rgba(22, 33, 62, 0.92);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(135, 206, 235, 0.25);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(135,206,235,0.08);
      max-width: 440px;
      width: 100%;
      padding: 44px 40px 36px;
      position: relative;
      z-index: 1;
      animation: slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand header ── */
    .auth-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-brand h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #87ceeb, #b06cf5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .auth-brand p {
      color: rgba(135,206,235,0.65);
      font-size: 0.88rem;
    }

    /* ── Form fields ── */
    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: rgba(232,232,240,0.85);
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(135,206,235,0.25);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #e8e8f0;
      font-family: 'Outfit', Arial, sans-serif;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #87ceeb;
      box-shadow: 0 0 0 3px rgba(135,206,235,0.14);
      background: rgba(135,206,235,0.06);
    }

    .form-group input::placeholder { color: rgba(232,232,240,0.35); }

    /* ── Password strength bar ── */
    .strength-wrap {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .strength-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.35s ease, background-color 0.35s ease;
    }

    .strength-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(232,232,240,0.45);
      transition: color 0.3s;
    }

    /* ── Message banners ── */
    .msg-banner {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 10px;
      animation: bannerIn 0.3s ease;
    }

    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-banner.show { display: flex; }

    .msg-banner.msg-error {
      background: rgba(255,107,107,0.12);
      border: 1.5px solid rgba(255,107,107,0.4);
      color: #ff8a8a;
    }

    .msg-banner.msg-success {
      background: rgba(81,207,102,0.12);
      border: 1.5px solid rgba(81,207,102,0.4);
      color: #6ee07a;
    }

    .msg-icon { font-size: 1.1rem; flex-shrink: 0; }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4fb3d9 0%, #8a4fd4 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Outfit', Arial, sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.5px;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(135,206,235,0.35);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .submit-btn.loading .btn-spinner { display: block; }
    .submit-btn.loading .btn-text::before { content: 'Creating account…'; }
    .submit-btn:not(.loading) .btn-text::before { content: 'Create Account'; }

    /* ── Footer link ── */
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      color: rgba(232,232,240,0.5);
      font-size: 0.88rem;
    }

    .auth-footer a {
      color: #87ceeb;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .auth-footer a:hover { color: #b06cf5; }

    /* ── Success overlay (shown after account created) ── */
    #successOverlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 18px;
      padding: 10px 0;
    }

    #successOverlay .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(81,207,102,0.25), rgba(81,207,102,0.1));
      border: 2px solid rgba(81,207,102,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    #successOverlay h2 {
      color: #6ee07a;
      font-size: 1.3rem;
      font-weight: 700;
    }

    #successOverlay p {
      color: rgba(232,232,240,0.6);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .redirect-bar-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .redirect-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #51cf66, #87ceeb);
      border-radius: 4px;
      animation: drain 3s linear forwards;
    }

    @keyframes drain { from { width: 100%; } to { width: 0%; } }

    .redirect-hint {
      color: rgba(135,206,235,0.55);
      font-size: 0.8rem;
    }

    .go-login-btn {
      padding: 10px 28px;
      background: rgba(135,206,235,0.12);
      border: 1.5px solid rgba(135,206,235,0.4);
      border-radius: 10px;
      color: #87ceeb;
      font-family: 'Outfit', Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
    }

    .go-login-btn:hover {
      background: rgba(135,206,235,0.22);
      transform: translateY(-1px);
    }

    /* ── Toast Notifications ── */
    #toastContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999 !important;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .ag-toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(81, 207, 102, 0.95) !important;
      border: 2px solid #51cf66 !important;
      border-radius: 12px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff !important;
      animation: toastSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 99999 !important;
    }

    .ag-toast:hover {
      transform: translateX(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }

    .ag-toast.ag-toast-success {
      border-color: #51cf66 !important;
      background: rgba(81, 207, 102, 0.95) !important;
    }

    .ag-toast.ag-toast-error {
      border-color: #ff6b6b !important;
      background: rgba(255, 107, 107, 0.95) !important;
      color: #ffffff !important;
    }

    .ag-toast.ag-toast-info {
      border-color: #87ceeb !important;
      background: rgba(135, 206, 235, 0.95) !important;
      color: #ffffff !important;
    }

    .ag-toast-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .ag-toast-msg {
      flex: 1;
    }

    .ag-toast.ag-toast-show {
      animation: toastSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">

    <!-- ── Brand ── -->
    <div class="auth-brand">
      <h1>αηιмєѕ தமிழ்</h1>
      <p>Create your free account</p>
    </div>

    <!-- ── Error / inline feedback banner ── -->
    <div class="msg-banner msg-error" id="errorMessage">
      <span class="msg-icon">⚠️</span>
      <span id="errorText"></span>
    </div>

    <!-- ── Success banner (inline, inside form area) ── -->
    <div class="msg-banner msg-success" id="inlineSuccess">
      <span class="msg-icon">✅</span>
      <span id="inlineSuccessText"></span>
    </div>

    <!-- ── Signup form ── -->
    <form id="signupForm">

      <div class="form-group">
        <label for="displayName">Display Name</label>
        <input type="text" id="displayName" name="displayName"
               placeholder="What should we call you?" autocomplete="name">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email"
               placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Create a strong password" required autocomplete="new-password">
        <!-- Password strength meter -->
        <div class="strength-wrap">
          <div class="strength-track">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword"
               placeholder="Repeat your password" required autocomplete="new-password">
      </div>

      <button type="submit" class="submit-btn" id="signupBtn" title="Create your account">
        <span class="btn-spinner" id="btnSpinner"></span>
        <span class="btn-text"></span>
      </button>
    </form>

    <!-- ── Success overlay (replaces form after account created) ── -->
    <div id="successOverlay">
      <div class="success-icon">🎉</div>
      <h2>Account Created!</h2>
      <p>
        Welcome to <strong>αηιмєѕ தமிழ்</strong>!<br>
        Your account is ready. Redirecting to login…
      </p>
      <div class="redirect-bar-wrap">
        <div class="redirect-bar" id="redirectBar"></div>
      </div>
      <span class="redirect-hint">Redirecting in 3 seconds…</span>
      <button class="go-login-btn" id="goLoginBtn">Go to Login Now →</button>
    </div>

    <!-- ── Footer ── -->
    <div class="auth-footer" id="footerNote">
      Already have an account? <a href="login.html">Log in here</a>
    </div>
  </div>

  <script type="module">
    import {
      auth,
      db,
      createUserWithEmailAndPassword,
      updateProfile,
      setDoc,
      doc
    } from './firebase-config.js';

    // ── Toast function (built-in) ────────────────────────────────────────────
    function showToast(message, type = 'info') {
      let container = document.getElementById('toastContainer');
      if (!container) {
        container = document.createElement('div');
        container.id = 'toastContainer';
        document.body.appendChild(container);
      }
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const t = document.createElement('div');
      t.className = `ag-toast ag-toast-${type}`;
      t.innerHTML = `<span class="ag-toast-icon">${icons[type] || icons.info}</span><span class="ag-toast-msg">${message}</span>`;
      container.appendChild(t);
      console.log('Toast shown:', message, type); // Debug log
      requestAnimationFrame(() => t.classList.add('ag-toast-show'));
      setTimeout(() => {
        t.classList.remove('ag-toast-show');
        setTimeout(() => t.remove(), 420);
      }, 3500);
    }

    // ── DOM references ────────────────────────────────────────────────────────
    const signupForm       = document.getElementById('signupForm');
    const displayNameInput = document.getElementById('displayName');
    const emailInput       = document.getElementById('email');
    const passwordInput    = document.getElementById('password');
    const confirmInput     = document.getElementById('confirmPassword');
    const signupBtn        = document.getElementById('signupBtn');
    const errorBanner      = document.getElementById('errorMessage');
    const errorText        = document.getElementById('errorText');
    const inlineBanner     = document.getElementById('inlineSuccess');
    const inlineSuccessText= document.getElementById('inlineSuccessText');
    const strengthBar      = document.getElementById('strengthBar');
    const strengthLabel    = document.getElementById('strengthLabel');
    const successOverlay   = document.getElementById('successOverlay');
    const footerNote       = document.getElementById('footerNote');
    const goLoginBtn       = document.getElementById('goLoginBtn');

    // ── Password strength meter ───────────────────────────────────────────────
    passwordInput.addEventListener('input', function () {
      const pw = this.value;
      let score = 0;

      if (pw.length >= 8)          score += 25; // length
      if (/[a-z]/.test(pw))        score += 20; // lowercase
      if (/[A-Z]/.test(pw))        score += 20; // uppercase
      if (/[0-9]/.test(pw))        score += 20; // number
      if (/[^a-zA-Z0-9]/.test(pw)) score += 15; // special char

      let color, label;
      if (score < 30)      { color = '#ff6b6b'; label = 'Weak'; }
      else if (score < 60) { color = '#ffa500'; label = 'Fair'; }
      else if (score < 85) { color = '#87ceeb'; label = 'Good'; }
      else                 { color = '#51cf66'; label = 'Strong'; }

      strengthBar.style.width           = score + '%';
      strengthBar.style.backgroundColor = color;
      strengthLabel.style.color         = color;
      strengthLabel.textContent          = pw.length ? label : '';
    });

    // ── Helper: show error banner ─────────────────────────────────────────────
    function showError(msg) {
      // Clear any inline success
      inlineBanner.classList.remove('show');

      errorText.textContent = msg;
      errorBanner.classList.add('show');

      // Scroll banner into view on small screens
      errorBanner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Helper: show inline success (brief, e.g. "Firestore synced") ─────────
    function showInlineSuccess(msg) {
      errorBanner.classList.remove('show');
      inlineSuccessText.textContent = msg;
      inlineBanner.classList.add('show');
    }

    // ── Helper: set button loading state ─────────────────────────────────────
    function setLoading(loading) {
      signupBtn.disabled = loading;
      signupBtn.classList.toggle('loading', loading);
    }

    // ── Helper: show full-screen success overlay ──────────────────────────────
    function showSuccessOverlay() {
      // Show toast notification immediately
      showToast('✅ Account created successfully!', 'success');

      // Hide form + footer
      signupForm.style.display      = 'none';
      inlineBanner.style.display    = 'none';
      errorBanner.style.display     = 'none';
      footerNote.style.display      = 'none';

      // Show big success state
      successOverlay.style.display  = 'flex';

      // Auto-redirect after 4 seconds (toast shows for 3.5s, plus buffer)
      const timer = setTimeout(() => {
        window.location.href = 'login.html';
      }, 4000);

      // Manual redirect button
      goLoginBtn.addEventListener('click', () => {
        clearTimeout(timer);
        window.location.href = 'login.html';
      });
    }

    // ── Map Firebase error codes → friendly messages ──────────────────────────
    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use' : '⚠️ This email is already registered. Try logging in instead.',
        'auth/invalid-email'        : '⚠️ That email address looks invalid. Please check it.',
        'auth/weak-password'        : '⚠️ Password is too weak. Use at least 8 characters with numbers & symbols.',
        'auth/network-request-failed': '⚠️ Network error. Check your internet connection and try again.',
        'auth/operation-not-allowed': '⚠️ Email/password sign-up is not enabled. Contact support.',
        'auth/too-many-requests'    : '⚠️ Too many attempts. Please wait a moment and try again.',
      };
      return map[code] || '⚠️ Something went wrong. Please try again.';
    }

    // ── Form submit handler ───────────────────────────────────────────────────
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear previous messages
      errorBanner.classList.remove('show');
      inlineBanner.classList.remove('show');

      const name            = displayNameInput.value.trim();
      const email           = emailInput.value.trim();
      const password        = passwordInput.value;
      const confirmPassword = confirmInput.value;

      // ── Client-side validation ──────────────────────────────────────────
      if (!email || !password || !confirmPassword) {
        showError('Please fill in all required fields.');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match. Please re-enter.');
        confirmInput.focus();
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters long.');
        passwordInput.focus();
        return;
      }

      // ── Start loading state ─────────────────────────────────────────────
      setLoading(true);
      console.log('Starting signup for:', email);

      try {
        // Step 1: Create Firebase Auth account
        console.log('Step 1: Creating Firebase Auth account...');
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        console.log('Step 1 Success: User created with UID:', user.uid);

        // Step 2: Set display name in Firebase Auth profile
        console.log('Step 2: Updating user profile...');
        const displayName = name || email.split('@')[0];
        await updateProfile(user, { displayName });
        console.log('Step 2 Success: Display name set to:', displayName);

        // Step 3: Create Firestore user document
        console.log('Step 3: Creating Firestore document...');
        try {
          // Create a promise that rejects after 5 seconds (timeout)
          const firestorePromise = setDoc(doc(db, 'users', user.uid), {
            email        : email,
            displayName  : displayName,
            bio          : '',
            favoriteGenre: '',
            watchlistCount: 0,
            hoursWatched : 0,
            createdAt    : new Date(),
            lastUpdated  : new Date()
          });
          
          const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error('Firestore timeout')), 5000)
          );
          
          await Promise.race([firestorePromise, timeoutPromise]);
          console.log('Step 3 Success: Firestore document created');
        } catch (firestoreError) {
          // Non-fatal: Firestore might not be configured yet or timed out
          console.warn('Step 3 Warning (non-fatal):', firestoreError.message);
        }

        // Step 4: Show success — big overlay with countdown bar
        console.log('Step 4: Showing success overlay...');
        // This is clearly visible; user cannot miss it
        showSuccessOverlay();

      } catch (error) {
        // Step 5: Show meaningful error message
        console.error('❌ Signup error at:', error.code, error.message);
        console.error('Full error:', error);
        showError(friendlyError(error.code));
        setLoading(false); // re-enable only on failure
      }

      // Note: we do NOT call setLoading(false) on success
      // because the page is about to redirect anyway
    });
  </script>
</body>

</html>
