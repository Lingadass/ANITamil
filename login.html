<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Animes தமிழ்</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
      padding: 40px;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .auth-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input::placeholder {
      color: #999;
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .remember-forgot label {
      display: flex;
      align-items: center;
      color: #666;
      cursor: pointer;
      margin: 0;
    }

    .remember-forgot input[type="checkbox"] {
      margin-right: 5px;
      cursor: pointer;
    }

    .remember-forgot a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .remember-forgot a:hover {
      color: #764ba2;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn.loading {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .auth-footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .auth-footer a:hover {
      color: #764ba2;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: white;
      border-radius: 10px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: slideIn 0.3s ease-out;
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      cursor: pointer;
      color: #999;
      transition: color 0.3s;
    }

    .modal-close:hover {
      color: #333;
    }

    .modal-content h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: 22px;
    }

    .modal-content > p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .modal-footer {
      text-align: center;
      margin-top: 20px;
    }

    .modal-footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .modal-footer a:hover {
      color: #764ba2;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>αηιмєѕ தமிழ்</h1>
      <p>Welcome back!</p>
    </div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="rememberMe" name="rememberMe">
          Remember me
        </label>
        <a href="#" id="forgotLink" style="cursor: pointer;">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotPasswordModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="modal-close" id="closeModal">&times;</span>
      <h2>Reset Your Password</h2>
      <p>Enter your email address and we'll send you a link to reset your password.</p>

      <div class="error-message" id="forgotErrorMessage"></div>
      <div class="success-message" id="forgotSuccessMessage"></div>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="resetEmail">Email Address</label>
          <input type="email" id="resetEmail" name="resetEmail" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="submit-btn" id="resetBtn">Send Reset Link</button>
      </form>

      <div class="modal-footer">
        <a href="#" id="backToLogin" style="cursor: pointer;">Back to Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from './firebase-config.js';

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberMe = document.getElementById('rememberMe');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    // Forgot password elements
    const forgotLink = document.getElementById('forgotLink');
    const forgotPasswordModal = document.getElementById('forgotPasswordModal');
    const closeModal = document.getElementById('closeModal');
    const backToLogin = document.getElementById('backToLogin');
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const resetEmail = document.getElementById('resetEmail');
    const resetBtn = document.getElementById('resetBtn');
    const forgotErrorMessage = document.getElementById('forgotErrorMessage');
    const forgotSuccessMessage = document.getElementById('forgotSuccessMessage');

    // Load saved email if "Remember me" was checked
    window.addEventListener('load', () => {
      const savedEmail = localStorage.getItem('savedEmail');
      const wasRemembered = localStorage.getItem('rememberMe');

      if (savedEmail && wasRemembered === 'true') {
        emailInput.value = savedEmail;
        rememberMe.checked = true;
      }
    });

    // Login form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validation
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save email if "Remember me" is checked
        if (rememberMe.checked) {
          localStorage.setItem('savedEmail', email);
          localStorage.setItem('rememberMe', 'true');
        } else {
          localStorage.removeItem('savedEmail');
          localStorage.removeItem('rememberMe');
        }

        showSuccess('Login successful! Redirecting to home...');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);
        let message = 'An error occurred during login';

        if (error.code === 'auth/user-not-found') {
          message = 'No account found with this email';
        } else if (error.code === 'auth/wrong-password') {
          message = 'Incorrect password';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Invalid email address';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'Too many failed login attempts. Try again later.';
        }

        showError(message);
      } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    });

    // Forgot password modal handling
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPasswordModal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
      forgotPasswordModal.style.display = 'none';
      resetEmail.value = '';
      forgotErrorMessage.classList.remove('show');
      forgotSuccessMessage.classList.remove('show');
    });

    backToLogin.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPasswordModal.style.display = 'none';
      resetEmail.value = '';
      forgotErrorMessage.classList.remove('show');
      forgotSuccessMessage.classList.remove('show');
    });

    // Close modal when clicking outside
    forgotPasswordModal.addEventListener('click', (e) => {
      if (e.target === forgotPasswordModal) {
        forgotPasswordModal.style.display = 'none';
        resetEmail.value = '';
        forgotErrorMessage.classList.remove('show');
        forgotSuccessMessage.classList.remove('show');
      }
    });

    // Password reset form submission
    forgotPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      forgotErrorMessage.classList.remove('show');
      forgotSuccessMessage.classList.remove('show');

      const email = resetEmail.value.trim();

      if (!email) {
        showForgotError('Please enter your email');
        return;
      }

      resetBtn.classList.add('loading');
      resetBtn.disabled = true;

      try {
        await sendPasswordResetEmail(auth, email);
        showForgotSuccess('Password reset link sent! Check your email inbox.');
        resetEmail.value = '';

        setTimeout(() => {
          forgotPasswordModal.style.display = 'none';
        }, 3000);

      } catch (error) {
        console.error('Password reset error:', error);
        let message = 'An error occurred';

        if (error.code === 'auth/user-not-found') {
          message = 'No account found with this email';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Invalid email address';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'Too many requests. Try again later.';
        }

        showForgotError(message);
      } finally {
        resetBtn.classList.remove('loading');
        resetBtn.disabled = false;
      }
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    function showSuccess(message) {
      successMessage.textContent = message;
      successMessage.classList.add('show');
    }

    function showForgotError(message) {
      forgotErrorMessage.textContent = message;
      forgotErrorMessage.classList.add('show');
    }

    function showForgotSuccess(message) {
      forgotSuccessMessage.textContent = message;
      forgotSuccessMessage.classList.add('show');
    }

    // Monitor auth state
    onAuthStateChanged(auth, (user) => {
      if (user) {
        console.log('User logged in:', user.email);
      } else {
        console.log('User logged out');
      }
    });
  </script>
</body>

</html>
