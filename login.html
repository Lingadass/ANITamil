<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - Animes தமிழ்</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at top left, rgba(135,206,235,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(176,108,245,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-container {
      background: rgba(22, 33, 62, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(135, 206, 235, 0.25);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(135,206,235,0.08);
      max-width: 420px;
      width: 100%;
      padding: 44px 40px 36px;
      position: relative;
      z-index: 1;
      animation: slideIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .auth-brand h1 {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #87ceeb, #b06cf5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .auth-brand p {
      color: rgba(135,206,235,0.65);
      font-size: 0.88rem;
      letter-spacing: 0.3px;
    }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      margin-bottom: 7px;
      color: rgba(232,232,240,0.85);
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(135,206,235,0.25);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #e8e8f0;
      font-family: 'Outfit', Arial, sans-serif;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #87ceeb;
      box-shadow: 0 0 0 3px rgba(135,206,235,0.14);
      background: rgba(135,206,235,0.06);
    }

    .form-group input::placeholder { color: rgba(232,232,240,0.35); }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      font-size: 0.84rem;
    }

    .remember-forgot label {
      display: flex;
      align-items: center;
      color: rgba(232,232,240,0.6);
      cursor: pointer;
      gap: 6px;
    }

    .remember-forgot input[type="checkbox"] { cursor: pointer; accent-color: #87ceeb; }

    .remember-forgot a {
      color: #87ceeb;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .remember-forgot a:hover { color: #b06cf5; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4fb3d9 0%, #8a4fd4 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Outfit', Arial, sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      letter-spacing: 0.5px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(135,206,235,0.35);
    }

    .submit-btn:active { transform: translateY(0); }

    .submit-btn.loading {
      opacity: 0.65;
      cursor: not-allowed;
      pointer-events: none;
    }

    .auth-footer {
      text-align: center;
      margin-top: 22px;
      color: rgba(232,232,240,0.5);
      font-size: 0.88rem;
    }

    .auth-footer a {
      color: #87ceeb;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s;
    }

    .auth-footer a:hover { color: #b06cf5; }

    /* Inline message banners */
    .msg-banner {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .msg-banner.show { display: flex; }
    .msg-banner.msg-error {
      background: rgba(255,107,107,0.15);
      border: 1.5px solid rgba(255,107,107,0.4);
      color: #ff8a8a;
    }
    .msg-banner.msg-success {
      background: rgba(81,207,102,0.15);
      border: 1.5px solid rgba(81,207,102,0.4);
      color: #6ee07a;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      background: rgba(22,33,62,0.98);
      border: 1.5px solid rgba(135,206,235,0.25);
      border-radius: 18px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      position: relative;
      animation: slideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 26px;
      cursor: pointer;
      color: rgba(135,206,235,0.5);
      background: none;
      border: none;
      transition: color 0.2s;
      line-height: 1;
    }
    .modal-close:hover { color: #87ceeb; }

    .modal-content h2 {
      color: #e8e8f0;
      margin-bottom: 8px;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .modal-content > p {
      color: rgba(232,232,240,0.55);
      font-size: 0.88rem;
      margin-bottom: 22px;
    }

    .modal-footer {
      text-align: center;
      margin-top: 18px;
    }

    .modal-footer a {
      color: #87ceeb;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      transition: color 0.2s;
    }
    .modal-footer a:hover { color: #b06cf5; text-decoration: underline; }

    /* ── Toast Notifications ── */
    #toastContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 99999 !important;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .ag-toast {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: rgba(81, 207, 102, 0.95) !important;
      border: 2px solid #51cf66 !important;
      border-radius: 12px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      font-size: 0.9rem;
      font-weight: 600;
      color: #ffffff !important;
      animation: toastSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      z-index: 99999 !important;
    }

    .ag-toast:hover {
      transform: translateX(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    }

    .ag-toast.ag-toast-success {
      border-color: #51cf66 !important;
      background: rgba(81, 207, 102, 0.95) !important;
    }

    .ag-toast.ag-toast-error {
      border-color: #ff6b6b !important;
      background: rgba(255, 107, 107, 0.95) !important;
      color: #ffffff !important;
    }

    .ag-toast.ag-toast-info {
      border-color: #87ceeb !important;
      background: rgba(135, 206, 235, 0.95) !important;
      color: #ffffff !important;
    }

    .ag-toast-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .ag-toast-msg {
      flex: 1;
    }

    .ag-toast.ag-toast-show {
      animation: toastSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes toastSlideIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>
</head>

<body>
  <div class="auth-container">
    <div class="auth-brand">
      <h1>αηιмєѕ தமிழ்</h1>
      <p>Welcome back — log in to continue</p>
    </div>

    <div class="msg-banner msg-error" id="errorMessage"></div>
    <div class="msg-banner msg-success" id="successMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="remember-forgot">
        <label>
          <input type="checkbox" id="rememberMe" name="rememberMe">
          Remember me
        </label>
        <a href="#" id="forgotLink" style="cursor: pointer;">Forgot password?</a>
      </div>

      <button type="submit" class="submit-btn" id="loginBtn">Log In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up here</a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div id="forgotPasswordModal" class="modal" style="display: none;">
    <div class="modal-content">
      <button class="modal-close" id="closeModal">&times;</button>
      <h2>Reset Password</h2>
      <p>Enter your email and we'll send a reset link.</p>

      <div class="msg-banner msg-error" id="forgotErrorMessage"></div>
      <div class="msg-banner msg-success" id="forgotSuccessMessage"></div>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="resetEmail">Email Address</label>
          <input type="email" id="resetEmail" name="resetEmail" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="submit-btn" id="resetBtn">Send Reset Link</button>
      </form>

      <div class="modal-footer">
        <a href="#" id="backToLogin" style="cursor: pointer;">Back to Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from './firebase-config.js';

    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rememberMe = document.getElementById('rememberMe');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');

    // Forgot password elements
    const forgotLink = document.getElementById('forgotLink');
    const forgotPasswordModal = document.getElementById('forgotPasswordModal');
    const closeModal = document.getElementById('closeModal');
    const backToLogin = document.getElementById('backToLogin');
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const resetEmail = document.getElementById('resetEmail');
    const resetBtn = document.getElementById('resetBtn');
    const forgotErrorMessage = document.getElementById('forgotErrorMessage');
    const forgotSuccessMessage = document.getElementById('forgotSuccessMessage');

    // Read optional redirect param
    const params = new URLSearchParams(window.location.search);
    const redirectPage = params.get('redirect') || 'index.html';

    // Load saved email if "Remember me" was checked
    window.addEventListener('load', () => {
      const savedEmail = localStorage.getItem('savedEmail');
      const wasRemembered = localStorage.getItem('rememberMe');

      if (savedEmail && wasRemembered === 'true') {
        emailInput.value = savedEmail;
        rememberMe.checked = true;
      }
    });

    // Login form submission
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validation
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save email if "Remember me" is checked
        if (rememberMe.checked) {
          localStorage.setItem('savedEmail', email);
          localStorage.setItem('rememberMe', 'true');
        } else {
          localStorage.removeItem('savedEmail');
          localStorage.removeItem('rememberMe');
        }

        showSuccess('Login successful! Redirecting…');
        setTimeout(() => {
          window.location.href = redirectPage;
        }, 1200);

      } catch (error) {
        console.error('Login error:', error);
        let message = 'An error occurred during login';

        if (error.code === 'auth/user-not-found') {
          message = 'No account found with this email';
        } else if (error.code === 'auth/wrong-password') {
          message = 'Incorrect password';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Invalid email address';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'Too many failed login attempts. Try again later.';
        }

        showError(message);
      } finally {
        loginBtn.classList.remove('loading');
        loginBtn.disabled = false;
      }
    });

    // Forgot password modal handling
    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPasswordModal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
      forgotPasswordModal.style.display = 'none';
      resetEmail.value = '';
      forgotErrorMessage.classList.remove('show');
      forgotSuccessMessage.classList.remove('show');
    });

    backToLogin.addEventListener('click', (e) => {
      e.preventDefault();
      forgotPasswordModal.style.display = 'none';
      resetEmail.value = '';
      forgotErrorMessage.classList.remove('show');
      forgotSuccessMessage.classList.remove('show');
    });

    // Close modal when clicking outside
    forgotPasswordModal.addEventListener('click', (e) => {
      if (e.target === forgotPasswordModal) {
        forgotPasswordModal.style.display = 'none';
        resetEmail.value = '';
        forgotErrorMessage.classList.remove('show');
        forgotSuccessMessage.classList.remove('show');
      }
    });

    // Password reset form submission
    forgotPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      forgotErrorMessage.classList.remove('show');
      forgotSuccessMessage.classList.remove('show');

      const email = resetEmail.value.trim();

      if (!email) {
        showForgotError('Please enter your email');
        return;
      }

      resetBtn.classList.add('loading');
      resetBtn.disabled = true;

      try {
        await sendPasswordResetEmail(auth, email);
        showForgotSuccess('Password reset link sent! Check your email inbox.');
        resetEmail.value = '';

        setTimeout(() => {
          forgotPasswordModal.style.display = 'none';
        }, 3000);

      } catch (error) {
        console.error('Password reset error:', error);
        let message = 'An error occurred';

        if (error.code === 'auth/user-not-found') {
          message = 'No account found with this email';
        } else if (error.code === 'auth/invalid-email') {
          message = 'Invalid email address';
        } else if (error.code === 'auth/too-many-requests') {
          message = 'Too many requests. Try again later.';
        }

        showForgotError(message);
      } finally {
        resetBtn.classList.remove('loading');
        resetBtn.disabled = false;
      }
    });

    function showError(message) {
      errorMessage.innerHTML = '<span>⚠️</span> ' + message;
      errorMessage.classList.add('show');
    }

    function showSuccess(message) {
      successMessage.innerHTML = '<span>✅</span> ' + message;
      successMessage.classList.add('show');
    }

    function showForgotError(message) {
      forgotErrorMessage.innerHTML = '<span>⚠️</span> ' + message;
      forgotErrorMessage.classList.add('show');
    }

    function showForgotSuccess(message) {
      forgotSuccessMessage.innerHTML = '<span>✅</span> ' + message;
      forgotSuccessMessage.classList.add('show');
    }

    // If user is already logged in, redirect away from login page
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace(redirectPage);
      }
    });
  </script>
</body>

</html>
